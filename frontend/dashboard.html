<!DOCTYPE html>
<html>
<head>

<title>Tourist Dashboard</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;

background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.7);
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#38bdf8;
}

.dashboard-container{
text-align:center;
padding:60px 20px;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
flex-wrap:wrap;
}

.stat-box{

background:rgba(0,0,0,0.6);
padding:25px;
border-radius:10px;
width:200px;

box-shadow:0 0 10px black;

}

.stat-box h2{
margin:10px 0;
color:#38bdf8;
}

/* CARDS */

.cards{
display:flex;
justify-content:center;
gap:30px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:12px;
width:220px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card:hover{
transform:scale(1.05);
background:#0284c7;
}

</style>

</head>

<body>

<header>

<h2>🌍 Tourist Safety</h2>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="map.html">Map</a>
<a href="report.html">Report</a>
<a href="sos.html">SOS</a>
</nav>

</header>


<div class="dashboard-container">

<h1>Welcome Tourist</h1>

<p>Tourist Safety Dashboard</p>


<!-- STATISTICS -->

<div class="stats">

<div class="stat-box">
<h3>Total Incidents</h3>
<h2 id="incidentCount">0</h2>
</div>

<div class="stat-box">
<h3>Total Tourists</h3>
<h2 id="touristCount">0</h2>
</div>

<div class="stat-box">
<h3>Active Alerts</h3>
<h2 id="alertCount">0</h2>
</div>

</div>


<!-- SERVICES -->

<div class="cards">

<div class="card" onclick="location.href='map.html'">

<h3>🗺 Tourist Map</h3>
<p>View safe tourist locations</p>

</div>


<div class="card" onclick="location.href='report.html'">

<h3>⚠ Report Incident</h3>
<p>Report unsafe situations</p>

</div>


<div class="card" onclick="location.href='sos.html'">

<h3>🚨 Emergency SOS</h3>
<p>Send emergency alert</p>

</div>


</div>

</div>


<script>

/* FETCH INCIDENT COUNT */

fetch("http://127.0.0.1:5000/incidents")
.then(res=>res.json())
.then(data=>{

document.getElementById("incidentCount").innerText=data.length;

})

/* FETCH TOURIST COUNT */

fetch("http://127.0.0.1:5000/tourists")
.then(res=>res.json())
.then(data=>{

document.getElementById("touristCount").innerText=data.length;

})


/* FETCH ALERT COUNT */

fetch("http://127.0.0.1:5000/alerts")
.then(res=>res.json())
.then(data=>{

document.getElementById("alertCount").innerText=data.length;

})

</script>


</body>
</html>
