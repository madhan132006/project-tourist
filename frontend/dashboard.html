<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tourist Safety Dashboard</title>
<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
color:#1f2937;
}
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.85);
z-index:-1;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#2563eb;
color:white;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
border-radius:0 0 10px 10px;
}
header h2{margin:0;font-size:24px;}
nav a{
color:white;margin:0 12px;text-decoration:none;font-weight:bold;padding:6px 12px;border-radius:6px;transition:0.3s;
}
nav a:hover{background:#1d4ed8;}
.dashboard-container{text-align:center;padding:60px 20px;}
.stats{display:flex;justify-content:center;gap:30px;margin-top:30px;flex-wrap:wrap;}
.stat-box{background:white;padding:25px;border-radius:12px;width:200px;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:0.3s;}
.stat-box:hover{transform:scale(1.05);}
.stat-box h2{margin:10px 0;color:#2563eb;font-size:24px;}
.cards{display:flex;justify-content:center;gap:30px;margin-top:50px;flex-wrap:wrap;}
.card{background:white;padding:30px;border-radius:12px;width:220px;cursor:pointer;transition:0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.15);text-align:center;}
.card:hover{transform:scale(1.05);background:#2563eb;color:white;}
.card h3{margin-bottom:10px;}
#feedbackForm{max-width:600px;margin:50px auto;padding:30px;background:white;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.1);text-align:center;display:none;}
#feedbackForm h2{color:#2563eb;margin-bottom:20px;}
#feedbackForm input,#feedbackForm textarea,#feedbackForm select{width:90%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #d1d5db;font-size:14px;}
#feedbackForm button{padding:12px 25px;border:none;background:#2563eb;color:white;font-weight:bold;border-radius:8px;cursor:pointer;transition:0.3s;}
#feedbackForm button:hover{background:#1d4ed8;}
</style>
</head>
<body>

<header>
<h2>🌍 Tourist Safety Dashboard</h2>
<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="map.html">Map</a>
<a href="#" onclick="showFeedbackForm()">Feedback</a>
</nav>
</header>

<div class="dashboard-container">
<h1>Welcome Tourist</h1>
<p>Tourist Safety Dashboard</p>

<div class="stats">
<div class="stat-box">
<h3>Total Incidents</h3>
<h2 id="incidentCount">0</h2>
</div>
<div class="stat-box">
<h3>Total Tourists</h3>
<h2 id="touristCount">0</h2>
</div>
</div>

<div class="cards">
<div class="card" onclick="location.href='map.html'">
<h3>🗺 Tourist Map</h3>
<p>View safe tourist locations</p>
</div>

<div class="card" onclick="location.href='report.html'">
<h3>⚠ Report Incident</h3>
<p>Report unsafe situations</p>
</div>

<div class="card" onclick="showFeedbackForm()">
<h3>💬 Feedback</h3>
<p>Share your experience</p>
</div>
</div>
</div>

<div id="feedbackForm">
<h2>Feedback & Ratings</h2>
<form id="feedbackFormEl">
<input type="text" placeholder="Your Name" required><br>
<select id="feedbackCategory">
<option value="Safety">Safety</option>
<option value="Services">Services</option>
<option value="Accommodation">Accommodation</option>
<option value="Other">Other</option>
</select><br>
<textarea placeholder="Your feedback..." rows="4" required></textarea><br>
<label>Rating:</label><br>
<select id="feedbackRating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select><br><br>
<button type="submit">Submit Feedback</button>
</form>
</div>

<script>
// -------- DASHBOARD JS (frontend + API calls placeholder) --------
async function fetchCounts() {
    try {
        const res = await fetch('/api/dashboard-counts');
        const data = await res.json();
        document.getElementById("incidentCount").innerText = data.total_incidents;
        document.getElementById("touristCount").innerText = data.total_tourists;
    } catch(err) { console.error(err); }
}

async function incrementTourist() {
    try {
        await fetch('/api/increment-tourist', { method:'POST' });
        fetchCounts();
    } catch(err) { console.error(err); }
}

window.onload = function() {
    incrementTourist();
    startSharingLocation('TOURIST123');
}

document.getElementById("feedbackFormEl").onsubmit = async function(e){
    e.preventDefault();
    let feedback = {
        name: this.querySelector('input').value,
        category: document.getElementById("feedbackCategory").value,
        rating: document.getElementById("feedbackRating").value,
        comment: this.querySelector('textarea').value,
        time: new Date().toISOString()
    };
    let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];
    feedbacks.push(feedback);
    localStorage.setItem("feedbacks", JSON.stringify(feedbacks));
    await fetch('/api/increment-incident', { method:'POST' });
    fetchCounts();
    alert("Feedback submitted successfully!");
    this.reset();
}

// -------- LIVE LOCATION --------
let watchId;
function startSharingLocation(touristId){
    if(!navigator.geolocation) return alert("Geolocation not supported");
    watchId = navigator.geolocation.watchPosition(
        (pos)=>{
            fetch("/api/update-location", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    touristId,
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                    timestamp: new Date().toISOString()
                })
            });
        }, (err)=>console.error(err),
        {enableHighAccuracy:true, maximumAge:0, timeout:5000}
    );
}
function stopSharing(){ if(watchId) navigator.geolocation.clearWatch(watchId); }
function showFeedbackForm(){document.getElementById("feedbackForm").style.display="block"; window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});}
</script>

</body>
</html>
