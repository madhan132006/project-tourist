<!DOCTYPE html>
<html>
<head>

<title>Tourist Safety Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
color:#38bdf8;
font-size:22px;
}

/* MAP */

#map{
height:90vh;
width:100%;
}

/* LOCATION BOX */

.location-box{
position:absolute;
top:70px;
left:20px;
background:#000;
padding:10px 15px;
border-radius:6px;
z-index:1000;
}

/* REPORT BUTTON */

.report-btn{
position:absolute;
bottom:40px;
right:30px;
background:#2563eb;
color:white;
border:none;
padding:14px 20px;
border-radius:10px;
cursor:pointer;
z-index:1000;
font-size:16px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.form-box{
background:#111;
padding:30px;
border-radius:10px;
width:350px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

textarea{
height:80px;
}

.submit-btn{
background:#2563eb;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

.close{
color:red;
cursor:pointer;
float:right;
font-size:20px;
}

</style>

</head>

<body>

<header>
🌍 Tourist Safety Map
</header>

<div id="map"></div>

<div class="location-box" id="placeName">
📍 Detecting location...
</div>

<button class="report-btn" onclick="openReport()">⚠ Report</button>


<!-- REPORT MODAL -->

<div class="modal" id="reportModal">

<div class="form-box">

<span class="close" onclick="closeReport()">✖</span>

<h2>Report Incident</h2>

<form id="reportForm">

<select required>
<option value="">Incident Type</option>
<option>Accident</option>
<option>Theft</option>
<option>Harassment</option>
<option>Medical Emergency</option>
</select>

<textarea placeholder="Describe incident..." required></textarea>

<input type="file">

<input id="locationField" readonly>

<button class="submit-btn">Submit</button>

</form>

</div>

</div>


<script>

/* CREATE MAP */

var map = L.map('map').setView([11.1271,78.6569],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


let marker;
let lat,lon;


/* GET USER LOCATION */

if(navigator.geolocation){

navigator.geolocation.watchPosition(function(position){

lat = position.coords.latitude;
lon = position.coords.longitude;

/* REMOVE OLD MARKER */

if(marker){
map.removeLayer(marker);
}

/* ADD NEW MARKER */

marker = L.marker([lat,lon]).addTo(map)
.bindPopup("📍 Your Location")
.openPopup();

map.setView([lat,lon],16);


/* GET VILLAGE / CITY NAME */

fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)

.then(res=>res.json())

.then(data=>{

let address=data.address;

let place =
address.village ||
address.town ||
address.city ||
address.county ||
address.state ||
"Unknown place";

document.getElementById("placeName").innerHTML="📍 "+place;

document.getElementById("locationField").value=
place+" ("+lat.toFixed(5)+","+lon.toFixed(5)+")";

});

},
function(error){

alert("Location access denied. Please allow GPS.");

},
{
enableHighAccuracy:true
});

}


/* OPEN REPORT */

function openReport(){
document.getElementById("reportModal").style.display="flex";
}

/* CLOSE REPORT */

function closeReport(){
document.getElementById("reportModal").style.display="none";
}


/* REPORT SUBMIT */

document.getElementById("reportForm").addEventListener("submit",function(e){

e.preventDefault();

let incident={

type:document.querySelector("select").value,

description:document.querySelector("textarea").value,

location:document.getElementById("locationField").value,

time:new Date().toISOString()

};

console.log("Incident Data:",incident);

alert("✅ Incident Report Submitted");

closeReport();

});

</script>

</body>
</html>
