<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - Tourist Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <header class="navbar">
        <div class="brand">SmartSafe Admin</div>
        <nav>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/tourist_map.html" class="active">Live Map</a>
            <a href="/alerts.html">Alerts & AI</a>
            <a href="/feedback.html">Feedback</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <div class="container" style="padding-top: 2rem; max-width: 1400px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Live Tourist Locations</h2>
            <button class="btn btn-outline" id="refreshMapBtn" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">⟳ Refresh Map</button>
        </div>
        
        <div class="glass-panel" style="padding: 1rem; border-radius: 20px;">
            <div id="map"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/js/main.js"></script>
    <script>
        let map;
        let markers = [];

        function initMap() {
            // Default center point roughly covering Earth
            map = L.map('map').setView([20, 0], 2);

            // Dark theme map tiles (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            
            // Render danger zones
            const dangerZones = [
                {name: "Restricted Area A", lat: 40.7128, lng: -74.0060, radius: 5.0},
                {name: "Avalanche Zone B", lat: 34.0522, lng: -118.2437, radius: 10.0}
            ];
            
            dangerZones.forEach(zone => {
                L.circle([zone.lat, zone.lng], {
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.2,
                    radius: zone.radius * 1000 // Convert km to meters for Leaflet
                }).addTo(map).bindPopup(`<b>Danger Zone:</b> ${zone.name}`);
            });
            
            loadLocations();
        }

        async function loadLocations() {
            try {
                const locations = await apiCall('/locations/');
                
                // Clear existing markers
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                
                if(locations.length > 0) {
                    const bounds = [];
                    locations.forEach(loc => {
                        const marker = L.circleMarker([loc.latitude, loc.longitude], {
                            radius: 8,
                            fillColor: "#3b82f6",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);
                        
                        marker.bindPopup(`
                            <div style="color: #333; padding: 5px;">
                                <strong style="color: #000;">Tourist ID: ${loc.tourist_id}</strong><br>
                                <span style="color: #555;">Time: ${new Date(loc.timestamp).toLocaleTimeString()}</span>
                            </div>
                        `);
                        
                        markers.push(marker);
                        bounds.push([loc.latitude, loc.longitude]);
                    });
                    
                    if(bounds.length > 0 && locations.length > 1) {
                        map.fitBounds(bounds, {padding: [50, 50]});
                    } else if (bounds.length === 1) {
                        map.setView(bounds[0], 13);
                    }
                }
            } catch (e) {
                console.error("Map load error:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', initMap);
        document.getElementById('refreshMapBtn').addEventListener('click', loadLocations);
    </script>
</body>
</html>
