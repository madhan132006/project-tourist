<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Tourist Safety Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.login-card{
width:370px;
padding:40px;
border-radius:14px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.login-card h2{
text-align:center;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
}

input::placeholder{
color:#e2e8f0;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

.wallet-btn{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#f59e0b;
color:white;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login-card">

<h2>Tourist Safety Login</h2>

<form id="loginForm">

<div class="input-box">
<input type="email" id="email" placeholder="Enter Gmail" required>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password" required>
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button type="submit" class="login-btn">Login</button>

</form>

<button class="wallet-btn" onclick="connectWallet()">
Login with MetaMask
</button>

</div>

<script>

/* SHOW PASSWORD */

function togglePassword(){
const pass=document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}


/* LOGIN SYSTEM */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email==="" || password===""){
alert("Please enter email and password ❌");
return;
}

/* LOGIN SUCCESS */

alert("Login Successful ✅");

/* GO TO DASHBOARD */

window.location.href="dashboard.html";

});


/* METAMASK LOGIN */

async function connectWallet(){

if(typeof window.ethereum !== "undefined"){

const web3=new Web3(window.ethereum);

await window.ethereum.request({method:"eth_requestAccounts"});

const accounts=await web3.eth.getAccounts();

alert("Wallet Connected: "+accounts[0]);

window.location.href="dashboard.html";

}else{

alert("MetaMask not installed");

}

}

</script>

</body>
</html>
